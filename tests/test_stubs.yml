- case: mp_node_subclass
  mypy_config: |
    [mypy]
    plugins = mypy_django_plugin.main

    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings
  main: |
    from treebeard.mp_tree import MP_Node
    from django.db import models

    class Category(MP_Node):
        name = models.CharField(max_length=100)

        class Meta:
            app_label = "test"

    # add_root returns Self
    root: Category = Category.add_root(name="root")
    reveal_type(root)  # N: Revealed type is "main.Category"

    # add_child returns Self
    child: Category = root.add_child(name="child")
    reveal_type(child)  # N: Revealed type is "main.Category"

