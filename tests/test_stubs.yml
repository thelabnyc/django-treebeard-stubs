- case: mp_node_navigation
  mypy_config: |
    [mypy]
    plugins = mypy_django_plugin.main

    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings
  main: |
    from treebeard.mp_tree import MP_Node
    from django.db import models

    class Category(MP_Node):
        name = models.CharField(max_length=100)

        class Meta:
            app_label = "test"

    node = Category.add_root(name="root")

    children = node.get_children()
    reveal_type(children)  # N: Revealed type is "django.db.models.query.QuerySet[main.Category, main.Category]"

    parent = node.get_parent()
    reveal_type(parent)  # N: Revealed type is "main.Category | None"

    is_leaf: bool = node.is_leaf()
    is_root: bool = node.is_root()

    depth: int = node.get_depth()

