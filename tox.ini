[tox]
isolated_build = True
envlist = stubtest,mypy-plugins

[testenv:stubtest]
runner = uv-venv-runner
deps =
    django>=5.2,<5.3
    django-stubs>=5.2.9
    mypy>=1.19.1
setenv =
    DJANGO_SETTINGS_MODULE=tests.mypy_test_settings
    PYTHONPATH={toxinidir}
commands =
    python {toxinidir}/run_stubtest.py treebeard --allowlist {toxinidir}/stubtest-allowlist.txt

[testenv:mypy-plugins]
runner = uv-venv-runner
deps =
    django>=5.2,<5.3
    django-stubs>=5.2.9
    pytest>=8.0
    pytest-mypy-plugins>=3.0
    mypy>=1.19.1
setenv =
    DJANGO_SETTINGS_MODULE=tests.mypy_test_settings
    PYTHONPATH={toxinidir}
commands =
    pytest tests/ --mypy-same-process {posargs}
